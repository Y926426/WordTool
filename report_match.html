<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报告匹配助手</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #f0f4f9; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 24px; }
        .container { max-width: 1600px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 12px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .header { background: #1e4663; color: white; padding: 24px 32px; }
        .header h1 { margin: 0; font-size: 1.8rem; }
        .content { padding: 28px 32px; }
        .row-2 { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
        .row-2 > div { flex: 1; min-width: 200px; }
        label { font-weight: 600; display: block; margin-bottom: 8px; color: #1e3b4f; }
        select, button {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: 0.2s;
        }
        select:focus { outline: none; border-color: #2c7da0; box-shadow: 0 0 0 3px rgba(44,125,160,0.2); }
        button {
            background: #1e6f3f;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: auto;
            min-width: 180px;
        }
        button:hover { background: #0f5a34; transform: translateY(-2px); }
        .flex-row { display: flex; gap: 24px; margin-bottom: 24px; }
        .left-panel, .right-panel {
            flex: 1;
            background: #f8fafc;
            border-radius: 20px;
            border: 1px solid #e2edf2;
            padding: 16px;
            overflow-y: auto;
            max-height: 550px;
        }
        .left-panel h4, .right-panel h4 { margin: 0 0 12px 0; color: #1e4663; }
        .clause-group {
            margin-bottom: 20px;
            border-left: 2px solid #cbd5e1;
            padding-left: 12px;
        }
        .group-title {
            font-weight: bold;
            font-size: 1rem;
            color: #1e4663;
            margin: 8px 0 8px 0;
            background: #eef3fa;
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
        }
        .clause-item {
            margin: 8px 0 8px 16px;
        }
        .clause-header {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .clause-header input { margin-top: 3px; }
        .clause-header label { font-weight: normal; color: #2c3e50; cursor: pointer; }
        .right-panel .report-for-clause {
            margin-bottom: 20px;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 12px;
        }
        .right-panel .clause-ref { font-weight: 600; margin-bottom: 8px; color: #2c7da0; background: #eef3fa; padding: 4px 8px; border-radius: 12px; }
        .report-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 18px;
            padding: 2px 10px;
            margin: 4px 8px 4px 0;
            font-size: 0.75rem;
        }
        .report-item input { width: 14px; height: 14px; margin: 0; }
        .report-item label { margin: 0; cursor: pointer; }
        .result-area { margin-top: 32px; border-top: 2px solid #e4edf5; padding-top: 24px; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .result-header h3 { margin: 0; font-size: 1.2rem; color: #1e4663; }
        .copy-btn { background: #2c7da0; border: none; padding: 6px 16px; border-radius: 40px; font-size: 0.85rem; color: white; cursor: pointer; }
        .copy-btn:hover { background: #1f5e7a; }
        .result-table { overflow-x: auto; border-radius: 20px; border: 1px solid #e2edf2; background: white; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { background: #eef3fa; padding: 12px 8px; text-align: center; font-weight: 600; color: #1e4a6e; border-bottom: 1px solid #cbd5e1; }
        td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #e9edf2; vertical-align: top; }
        .button-bar { display: flex; gap: 12px; margin-bottom: 16px; justify-content: center; }
        .clause-copy-area {
            margin-top: 20px;
            padding: 16px;
            background: #f0f7ee;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
        }
        .clause-copy-area h4 {
            margin: 0 0 8px 0;
            font-size: 1rem;
            color: #1e4663;
        }
        .clause-copy-box {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.85rem;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .copy-clause-btn {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 8px;
        }
        .copy-clause-btn:hover { background: #1f5e7a; }
    </style>
</head>

<div class="container">
    <div class="header">
        <h1>📋 报告匹配助手 · 完整功能版</h1>
    </div>
    <div class="content">
        <div class="row-2">
            <div><label>📌 科目类型</label><select id="projectType"></select></div>
            <div><label>📜 协议框架</label><select id="framework"><option value="框架1">框架1</option><option value="框架2">框架2</option></select></div>
        </div>
        <div class="button-bar">
            <button id="selectAllBtn">✅ 全选所有条款</button>
            <button id="clearAllBtn">🗑️ 清除所有条款</button>
        </div>
        <div class="flex-row">
            <div class="left-panel">
                <h4>📌 协议条款（勾选后右侧显示可选报告）</h4>
                <div id="clauseTree"></div>
            </div>
            <div class="right-panel">
                <h4>📄 关联报告（可独立勾选）</h4>
                <div id="reportPanel"></div>
            </div>
        </div>
        <div class="result-area">
            <div class="result-header">
                <h3>📌 匹配结果（表格）</h3>
                <button id="copyTableBtn" class="copy-btn">📋 复制表格</button>
            </div>
            <div id="tableContainer" class="result-table"></div>
            <div class="clause-copy-area">
                <h4>📋 最终协议条款</h4>
                <div id="clauseCopyBox" class="clause-copy-box"></div>
                <button id="copyClauseBtn" class="copy-clause-btn">📋 复制协议条款</button>
            </div>
        </div>
    </div>
</div>

        "《资产管理金融产品分析报告》": "信息资讯类",
        "《绿色金融市场分析报告》": "信息资讯类",
        "《企业资产管理服务方案》": "企业分析类",
        "《投资风险评估报告》": "企业分析类",
        "《营运资金管理建议书》": "企业分析类",
        "《项目运营管理建议书》": "企业分析类",
        "《中介机构推介报告》": "企业分析类",
        "《企业经营状况分析报告》": "企业分析类",
        "《财务状况分析报告》": "企业分析类",
        "《企业财务情况诊断报告》": "企业分析类",
        "《投融资方案设计报告》": "企业分析类",
        "《尽职调查报告》": "企业分析类",
        "《绿色建筑市场咨询》": "企业分析类",
        "《债务优化实例及产品介绍》": "企业分析类",
        "《债务情况诊断分析》": "企业分析类",
        "《债务优化方案设计》": "企业分析类",
        "《项目融资方案建议书》": "企业分析类",
        "《项目风险管理建议书》": "企业分析类",
        "《项目融资需求分析及风险报告》": "企业分析类",
        "《项目融资实施方案》": "企业分析类",
        "《项目资金管理建议书》": "企业分析类",
        "《项目融资风险评估报告》": "企业分析类"
    };

    function getReportType(reportName) {
        if (REPORT_TYPE_MAP[reportName]) return REPORT_TYPE_MAP[reportName];
        if (reportName.includes("分析报告") || reportName.includes("资讯") || reportName.includes("市场运行")) return "信息资讯类";
        return "企业分析类";
    }

    function getReportsForClause(clauseText) {
        let reports = new Set();
        for (let [keyword, reportList] of Object.entries(MATCH_RULES)) {
            if (clauseText.includes(keyword)) {
                reportList.forEach(r => reports.add(r));
            }
        }
        if (reports.size === 0) {
            if (clauseText.includes("金融法规")) reports.add("《金融法规政策分析解读》");
            if (clauseText.includes("宏观经济")) reports.add("《区域经济分析及行业分析报告》");
            if (clauseText.includes("金融市场")) reports.add("《金融市场运行分析》");
        }
        return Array.from(reports);
    }

    let currentType = "全面金融解决方案";
    let currentFramework = "框架1";
    let clauseChecked = new Map();
    let reportChecked = new Map();

    function renderClauseTree() {
        const groups = PROTOCOLS[currentType]?.[currentFramework] || [];
        const container = document.getElementById('clauseTree');
        if (!groups.length) {
            container.innerHTML = '<p>当前框架无条款数据</p>';
            return;
        }
        let html = '';
        for (let group of groups) {
            html += `<div class="clause-group"><div class="group-title">${group.level1}</div>`;
            for (let clauseText of group.clauses) {
                const secNum = clauseText.match(/^\d+/)?.[0] || '';
                const clauseKey = `${group.level1}_${secNum}`;
                const isChecked = clauseChecked.get(clauseKey) || false;
                html += `<div class="clause-item">
                            <div class="clause-header">
                                <input type="checkbox" class="clause-chk" data-key="${clauseKey}" data-text="${escapeHtml(clauseText)}" data-level1="${group.level1}" ${isChecked ? 'checked' : ''}>
                                <label>${escapeHtml(clauseText)}</label>
                            </div>
                        </div>`;
            }
            html += `</div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.clause-chk').forEach(chk => {
            chk.addEventListener('change', (e) => {
                const key = chk.getAttribute('data-key');
                clauseChecked.set(key, chk.checked);
                renderRightPanel();
                updateResultTable();
                updateClauseCopyBox();
            });
        });
    }

    function renderRightPanel() {
        const groups = PROTOCOLS[currentType]?.[currentFramework] || [];
        const container = document.getElementById('reportPanel');
        let html = '';
        for (let group of groups) {
            for (let clauseText of group.clauses) {
                const secNum = clauseText.match(/^\d+/)?.[0] || '';
                const clauseKey = `${group.level1}_${secNum}`;
                if (clauseChecked.get(clauseKey)) {
                    const reports = getReportsForClause(clauseText);
                    if (reports.length === 0) continue;
                    html += `<div class="report-for-clause">
                                <div class="clause-ref">${group.level1}${secNum} ${escapeHtml(clauseText.substring(0, 60))}…</div>
                                <div>`;
                    for (let rep of reports) {
                        const reportKey = `${clauseKey}_${rep}`;
                        const repChecked = reportChecked.get(reportKey) || false;
                        html += `<div class="report-item">
                                    <input type="checkbox" class="report-chk" data-clause-key="${clauseKey}" data-report="${escapeHtml(rep)}" ${repChecked ? 'checked' : ''}>
                                    <label>${escapeHtml(rep)}</label>
                                </div>`;
                    }
                    html += `</div></div>`;
                }
            }
        }
        if (html === '') html = '<p>请先在左侧勾选条款，右侧会显示可选报告。</p>';
        container.innerHTML = html;
        document.querySelectorAll('.report-chk').forEach(chk => {
            chk.addEventListener('change', (e) => {
                const clauseKey = chk.getAttribute('data-clause-key');
                const reportName = chk.getAttribute('data-report');
                const reportKey = `${clauseKey}_${reportName}`;
                reportChecked.set(reportKey, chk.checked);
                updateResultTable();
            });
        });
    }

    function updateResultTable() {
        const groups = PROTOCOLS[currentType]?.[currentFramework] || [];
        const selected = new Map(); // 报告名称 -> { clauseNumbers: Set, type: string }
        for (let group of groups) {
            for (let clauseText of group.clauses) {
                const secNum = clauseText.match(/^\d+/)?.[0] || '';
                const clauseKey = `${group.level1}_${secNum}`;
                const reports = getReportsForClause(clauseText);
                for (let rep of reports) {
                    const reportKey = `${clauseKey}_${rep}`;
                    if (reportChecked.get(reportKey)) {
                        if (!selected.has(rep)) {
                            selected.set(rep, { clauseNumbers: new Set(), type: getReportType(rep) });
                        }
                        const clauseNumber = `${group.level1}${secNum}`;
                        selected.get(rep).clauseNumbers.add(clauseNumber);
                    }
                }
            }
        }
        const container = document.getElementById('tableContainer');
        if (selected.size === 0) {
            container.innerHTML = '<div style="padding:20px;text-align:center;">请勾选报告以生成匹配结果（表格）</div>';
            return;
        }
        let html = `<table><thead><th>序号</th><th>报告类型</th><th>报告名称</th><th>协议条款编号</th></thead><tbody>`;
        let idx = 1;
        for (let [reportName, { clauseNumbers, type }] of selected.entries()) {
            const numbers = Array.from(clauseNumbers).join('；');
            html += `<tr><td style="text-align:center;">${idx++}</td><td style="text-align:center;">${escapeHtml(type)}</td><td style="text-align:left;">${escapeHtml(reportName)}</td><td style="text-align:left;">${escapeHtml(numbers)}</td></tr>`;
        }
        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function updateClauseCopyBox() {
        const groups = PROTOCOLS[currentType]?.[currentFramework] || [];
        // 按一级标题分组，每个标题下收集勾选的条款
        const grouped = new Map(); // level1 -> array of clauseText
        for (let group of groups) {
            const level1 = group.level1;
            if (!grouped.has(level1)) grouped.set(level1, []);
            for (let clauseText of group.clauses) {
                const secNum = clauseText.match(/^\d+/)?.[0] || '';
                const clauseKey = `${group.level1}_${secNum}`;
                if (clauseChecked.get(clauseKey)) {
                    grouped.get(level1).push(clauseText);
                }
            }
        }
        let output = '';
        for (let [level1, clauses] of grouped.entries()) {
            if (clauses.length === 0) continue;
            output += level1 + '\n';
            for (let clause of clauses) {
                output += clause + '\n';
            }
        }
        const box = document.getElementById('clauseCopyBox');
        if (output === '') {
            box.innerText = '未勾选任何条款';
        } else {
            box.innerText = output;
        }
    }

    function selectAll() {
        const groups = PROTOCOLS[currentType]?.[currentFramework] || [];
        for (let group of groups) {
            for (let clauseText of group.clauses) {
                const secNum = clauseText.match(/^\d+/)?.[0] || '';
                const clauseKey = `${group.level1}_${secNum}`;
                clauseChecked.set(clauseKey, true);
                const reports = getReportsForClause(clauseText);
                for (let rep of reports) {
                    const reportKey = `${clauseKey}_${rep}`;
                    reportChecked.set(reportKey, true);
                }
            }
        }
        renderClauseTree();
        renderRightPanel();
        updateResultTable();
        updateClauseCopyBox();
    }

    function clearAll() {
        clauseChecked.clear();
        reportChecked.clear();
        renderClauseTree();
        renderRightPanel();
        updateResultTable();
        updateClauseCopyBox();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    async function copyFullTable() {
        const table = document.querySelector('#tableContainer table');
        if (!table) { alert('没有可复制的表格'); return; }
        const rows = [];
        const headers = ['序号', '报告类型', '报告名称', '协议条款编号'];
        rows.push(headers.join('\t'));
        const bodyRows = table.querySelectorAll('tbody tr');
        for (let row of bodyRows) {
            const cells = row.querySelectorAll('td');
            const rowData = [cells[0].innerText.trim(), cells[1].innerText.trim(), cells[2].innerText.trim(), cells[3].innerText.trim()];
            rows.push(rowData.join('\t'));
        }
        const text = rows.join('\n');
        if (navigator.clipboard && window.isSecureContext !== false) {
            try { await navigator.clipboard.writeText(text); alert('✅ 表格已复制'); } catch(e) { fallbackCopy(text); }
        } else { fallbackCopy(text); }
        function fallbackCopy(txt) {
            const ta = document.createElement('textarea');
            ta.value = txt;
            ta.style.position = 'fixed'; ta.style.top = '-9999px';
            document.body.appendChild(ta); ta.select();
            let ok = false;
            try { ok = document.execCommand('copy'); } catch(e) {}
            document.body.removeChild(ta);
            alert(ok ? '✅ 表格已复制' : '❌ 复制失败');
        }
    }

    async function copyClauseText() {
        const box = document.getElementById('clauseCopyBox');
        const text = box.innerText;
        if (!text || text === '未勾选任何条款') {
            alert('没有勾选的条款');
            return;
        }
        if (navigator.clipboard && window.isSecureContext !== false) {
            try { await navigator.clipboard.writeText(text); alert('✅ 协议条款已复制'); } catch(e) { fallbackCopy(text); }
        } else { fallbackCopy(text); }
        function fallbackCopy(txt) {
            const ta = document.createElement('textarea');
            ta.value = txt;
            ta.style.position = 'fixed'; ta.style.top = '-9999px';
            document.body.appendChild(ta); ta.select();
            let ok = false;
            try { ok = document.execCommand('copy'); } catch(e) {}
            document.body.removeChild(ta);
            alert(ok ? '✅ 协议条款已复制' : '❌ 复制失败');
        }
    }

    // 初始化下拉框
    const projectSelect = document.getElementById('projectType');
    projectSelect.innerHTML = Object.keys(PROTOCOLS).map(t => `<option value="${t}">${t}</option>`).join('');
    projectSelect.value = currentType;
    projectSelect.addEventListener('change', (e) => {
        currentType = e.target.value;
        currentFramework = "框架1";
        document.getElementById('framework').value = currentFramework;
        clauseChecked.clear();
        reportChecked.clear();
        renderClauseTree();
        renderRightPanel();
        updateResultTable();
        updateClauseCopyBox();
    });
    document.getElementById('framework').addEventListener('change', (e) => {
        currentFramework = e.target.value;
        clauseChecked.clear();
        reportChecked.clear();
        renderClauseTree();
        renderRightPanel();
        updateResultTable();
        updateClauseCopyBox();
    });
    document.getElementById('selectAllBtn').addEventListener('click', selectAll);
    document.getElementById('clearAllBtn').addEventListener('click', clearAll);
    document.getElementById('copyTableBtn').addEventListener('click', copyFullTable);
    document.getElementById('copyClauseBtn').addEventListener('click', copyClauseText);

    // 初始渲染
    renderClauseTree();
    renderRightPanel();
    updateResultTable();
    updateClauseCopyBox();
</script>
</body>
