        { keywords: ["绿色金融", "ESG", "碳排放", "绿色信贷", "绿色债券", "绿色建筑", "绿色信息"], name: "《绿色金融市场分析报告》", type: "信息资讯类", minPage: 15, maxPage: 30, base: 22 },
        { keywords: ["数据中心", "算力", "IDC"], name: "《数据中心项目推荐报告》", type: "企业分析类", minPage: 25, maxPage: 40, base: 32 }
    ];

    // ================= 通用规则 =================
    const GENERAL_RULES = [
        { keywords: ["经营管理建议", "组织结构优化", "业务流程优化"], name: "《经营管理和战略规划建议书》", type: "企业分析类", minPage: 25, maxPage: 45, base: 35 },
        { keywords: ["融资产品分析", "融资条件清单"], name: "《融资产品分析及融资条件清单》", type: "信息资讯类", minPage: 20, maxPage: 40, base: 30 },
        { keywords: ["尽职调查", "资产结构", "债务结构", "价值评估", "利润预测"], name: "《尽职调查报告》", type: "企业分析类", minPage: 20, maxPage: 50, base: 35 }
    ];

    function isChapterTitle(line) {
        return /^[\s]*[（(][一二三四五六七八九十]+[）)][\s]*$/.test(line) ||
               (/^[\s]*[（(][一二三四五六七八九十]+[）)][\s]*[^0123456789一二三四五六七八九十]*$/.test(line) && !/[0-9][\.、．]/.test(line));
    }

    function extractLineNumber(line) {
        let m = line.match(/^[\s]*[（(][一二三四五六七八九十]+[）)][\s]*[\d]+[\s]*[、.．]?/);
        if (m) return m[0].trim();
        m = line.match(/^[\s]*[（(]\d+[）)][\s]*/);
        if (m) return m[0].trim();
        m = line.match(/^[\s]*\d+[\.、．][\s]*/);
        if (m) return m[0].trim().slice(0, -1);
        m = line.match(/^[\s]*第[一二三四五六七八九十\d]+条/);
        if (m) return m[0].trim();
        return "";
    }

    function matchReportForLine(line, projectType) {
        const projectRules = PROJECT_RULES[projectType] || [];
        for (let rule of projectRules) {
            if (rule.keywords.some(kw => line.includes(kw))) {
                return { name: rule.name, type: rule.type, minPages: rule.minPage, maxPages: rule.maxPage, basePages: rule.base };
            }
        }
        for (let rule of HISTORIC_RULES) {
            if (rule.keywords.some(kw => line.includes(kw))) {
                return { name: rule.name, type: rule.type, minPages: rule.minPage, maxPages: rule.maxPage, basePages: rule.base };
            }
        }
        for (let rule of GENERAL_RULES) {
            if (rule.keywords.some(kw => line.includes(kw))) {
                return { name: rule.name, type: rule.type, minPages: rule.minPage, maxPages: rule.maxPage, basePages: rule.base };
            }
        }
        return null;
    }

    function matchReportsByLine(clauseText, projectType) {
        const lines = clauseText.split(/\r?\n/);
        const reportMap = new Map();
        const unmatchedLines = [];

        for (let line of lines) {
            line = line.trim();
            if (!line || isChapterTitle(line)) continue;
            const matched = matchReportForLine(line, projectType);
            if (matched) {
                const key = matched.name;
                if (!reportMap.has(key)) {
                    reportMap.set(key, {
                        name: matched.name,
                        type: matched.type,
                        minPages: matched.minPages,
                        maxPages: matched.maxPages,
                        basePages: matched.basePages,
                        clauseNumbers: [],
                        clauseContents: []
                    });
                }
                const num = extractLineNumber(line);
                if (num) reportMap.get(key).clauseNumbers.push(num);
                else reportMap.get(key).clauseNumbers.push("?");
                reportMap.get(key).clauseContents.push(line);
            } else {
                unmatchedLines.push(line);
            }
        }

        const reports = Array.from(reportMap.values()).map(r => ({
            name: r.name,
            type: r.type,
            minPages: r.minPages,
            maxPages: r.maxPages,
            basePages: r.basePages,
            clauseNumber: r.clauseNumbers.join(", "),
            clauseContent: r.clauseContents.join("；")
        }));

        if (reports.length === 0) {
            reports.push({
                name: "《综合金融服务报告》",
                type: "企业分析类",
                minPages: 30,
                maxPages: 80,
                basePages: 50,
                clauseNumber: "",
                clauseContent: "未匹配到具体条款，默认生成综合服务报告"
            });
        }
        return { reports, unmatchedLines };
    }

    function allocatePages(reports, userTotal) {
        if (reports.length === 0) return [];
        const totalBase = reports.reduce((s, r) => s + r.basePages, 0);
        let pages = new Array(reports.length).fill(0);
        if (totalBase === 0) {
            let each = Math.round(userTotal / reports.length / 5) * 5;
            if (each < 5) each = 5;
            pages.fill(each);
            let sum = pages.reduce((a,b)=>a+b,0);
            let diff = userTotal - sum;
            if (diff !== 0) pages[0] += diff;
            for (let i=0; i<reports.length; i++) {
                if (pages[i] < reports[i].minPages) pages[i] = reports[i].minPages;
                if (pages[i] > reports[i].maxPages) pages[i] = reports[i].maxPages;
                if (pages[i] <= 0) pages[i] = 5;
            }
            return pages;
        }
        let raw = reports.map(r => (r.basePages / totalBase) * userTotal);
        pages = raw.map(v => Math.round(v));
        let sum = pages.reduce((a,b)=>a+b,0);
        let diff = userTotal - sum;
        if (diff !== 0) pages[pages.length-1] += diff;
        pages = pages.map((v,i) => {
            let r5 = Math.round(v / 5) * 5;
            if (r5 < reports[i].minPages) r5 = reports[i].minPages;
            if (r5 > reports[i].maxPages) r5 = reports[i].maxPages;
            if (r5 <= 0) r5 = 5;
            return r5;
        });
        sum = pages.reduce((a,b)=>a+b,0);
        diff = userTotal - sum;
        if (diff !== 0 && pages.length > 0) {
            let lastIdx = pages.length - 1;
            pages[lastIdx] += diff;
            if (pages[lastIdx] < reports[lastIdx].minPages) pages[lastIdx] = reports[lastIdx].minPages;
            if (pages[lastIdx] > reports[lastIdx].maxPages) pages[lastIdx] = reports[lastIdx].maxPages;
            if (pages[lastIdx] <= 0) pages[lastIdx] = 5;
        }
        let finalSum = pages.reduce((a,b)=>a+b,0);
        let finalDiff = userTotal - finalSum;
        if (finalDiff !== 0 && pages.length > 0) {
            pages[pages.length-1] += finalDiff;
            let lastIdx = pages.length-1;
            if (pages[lastIdx] < reports[lastIdx].minPages) pages[lastIdx] = reports[lastIdx].minPages;
            if (pages[lastIdx] > reports[lastIdx].maxPages) pages[lastIdx] = reports[lastIdx].maxPages;
            if (pages[lastIdx] <= 0) pages[lastIdx] = 5;
        }
        return pages;
    }

    function generatePlan(clauseText, userTotal, projectType) {
        const { reports, unmatchedLines } = matchReportsByLine(clauseText, projectType);
        const pages = allocatePages(reports, userTotal);
        const results = reports.map((r, i) => ({
            type: r.type,
            name: r.name,
            clauseNumber: r.clauseNumber,
            clauseContent: r.clauseContent,
            pages: pages[i]
        }));
        return { results, unmatchedLines };
    }

    const SUGGESTION_GROUPS = [
        { reports: ["《金融市场运行分析》", "《金融产品分析报告》"], combined: "《金融市场运行分析及金融产品分析报告》" },
        { reports: ["《企业经营分析报告》", "《企业财务情况诊断报告》"], combined: "《企业经营及财务综合分析报告》" },
        { reports: ["《投融资顾问建议书》", "《企业债务优化方案建议》"], combined: "《投融资及债务优化综合报告》" }
    ];

    function generateSuggestion(matchedReports) {
        const matchedNames = matchedReports.map(r => r.name);
        const suggestions = [];
        for (let group of SUGGESTION_GROUPS) {
            if (group.reports.every(name => matchedNames.includes(name))) {
                suggestions.push(`${group.reports.join('+')} → ${group.combined}`);
            }
        }
        return suggestions.length ? suggestions : null;
    }

    let currentData = null, currentTarget = 0;

    function getColumnData(col) {
        if (!currentData) return [];
        return currentData.map((row, idx) => {
            if (col === 0) return (idx+1).toString();
            if (col === 1) return row.type;
            if (col === 2) return row.name;
            if (col === 3) return row.clauseNumber;
            if (col === 4) return row.clauseContent;
            if (col === 5) return row.pages.toString();
            return '';
        });
    }

    async function copyColumn(col, name) {
        const data = getColumnData(col);
        if (!data.length) return alert('无数据');
        const text = data.join('\n');
        if (navigator.clipboard && window.isSecureContext !== false) {
            try { await navigator.clipboard.writeText(text); alert(`✅ 列“${name}”已复制`); return; } catch(e) {}
        }
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
        document.body.appendChild(ta); ta.select();
        let ok = false;
        try { ok = document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(ta);
        alert(ok ? `✅ 列“${name}”已复制` : '❌ 复制失败，请手动复制');
    }

    function renderTable(data, target, projectType) {
        const container = document.getElementById('tableContainer');
        const totalDiv = document.getElementById('totalInfo');
        document.getElementById('projectTypeDisplay').innerHTML = `（项目类型：${projectType}）`;
        if (!data.length) { container.innerHTML = '<div style="padding:20px;text-align:center;">未匹配到报告</div>'; totalDiv.innerHTML = ''; return; }
        const total = data.reduce((s,r)=>s+r.pages,0);
        const headers = ['序号', '报告类型', '报告名称', '对应条款', '对应条款（具体内容）', '单篇页数'];
        let html = '<table><thead><tr>';
        for (let i=0; i<headers.length; i++) html += `<th>${headers[i]}<br><button class="col-copy-btn" data-col="${i}" data-name="${headers[i]}">复制此列</button></th>`;
        html += '</thead><tbody>';
        data.forEach((r,idx) => {
            html += `<tr>
                <td style="text-align:center;">${idx+1}</td>
                <td style="text-align:center;">${escapeHtml(r.type)}</td>
                <td style="text-align:left;">${escapeHtml(r.name)}</td>
                <td style="text-align:center;">${escapeHtml(r.clauseNumber)}</td>
                <td style="text-align:left;">${escapeHtml(r.clauseContent)}</td>
                <td style="text-align:center;">${r.pages}</td>
            </tr>`;
        });
        html += '</tbody><table>';
        container.innerHTML = html;
        totalDiv.innerHTML = `📊 合计总页数：${total} 页（目标：${target} 页）`;
        document.querySelectorAll('.col-copy-btn').forEach(btn => btn.addEventListener('click', (e) => {
            e.stopPropagation();
            copyColumn(parseInt(btn.dataset.col), btn.dataset.name);
        }));
    }

    function renderSuggestion(matchedReports) {
        const container = document.getElementById('suggestionContainer');
        const sug = generateSuggestion(matchedReports);
        if (!sug) { container.style.display = 'none'; return; }
        container.style.display = 'block';
        container.innerHTML = sug.map(s => `合并建议：${s}<br>`).join('');
    }

    function renderUnmatched(unmatchedLines) {
        const container = document.getElementById('unmatchedContainer');
        if (!unmatchedLines.length) { container.style.display = 'none'; return; }
        container.style.display = 'block';
        container.innerHTML = '<strong>⚠️ 以下条款未匹配到任何报告，请手动补充规则：</strong><br>' + unmatchedLines.map(l => `• ${escapeHtml(l)}`).join('<br>');
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }

    async function copyFullTable(data, target) {
        if (!data.length) return alert('无数据');
        const total = data.reduce((s,r)=>s+r.pages,0);
        const rows = [['序号','报告类型','报告名称','对应条款','对应条款（具体内容）','单篇页数'].join('\t'),
                      ...data.map((r,i)=>[i+1, r.type, r.name, r.clauseNumber, r.clauseContent, r.pages].join('\t')),
                      ['合计','','','','',`${total} 页（目标：${target} 页）`].join('\t')];
        const text = rows.join('\n');
        if (navigator.clipboard && window.isSecureContext !== false) {
            try { await navigator.clipboard.writeText(text); alert('✅ 完整表格已复制'); return; } catch(e) {}
        }
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
        document.body.appendChild(ta); ta.select();
        let ok = false;
        try { ok = document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(ta);
        alert(ok ? '✅ 完整表格已复制' : '❌ 复制失败，请手动复制');
    }

    document.getElementById('matchBtn').addEventListener('click', () => {
        const clause = document.getElementById('clauseText').value.trim();
        if (!clause) return alert('请输入协议条款内容');
        let total = parseInt(document.getElementById('totalPages').value, 10);
        if (isNaN(total) || total < 1) return alert('请输入有效的总页数（正整数）');
        const projectType = document.getElementById('projectType').value;
        const { results, unmatchedLines } = generatePlan(clause, total, projectType);
        currentData = results; currentTarget = total;
        document.getElementById('resultArea').style.display = 'block';
        renderTable(results, total, projectType);
        renderSuggestion(results);
        renderUnmatched(unmatchedLines);
    });
    document.getElementById('copyTableBtn').addEventListener('click', () => {
        if (currentData) copyFullTable(currentData, currentTarget);
        else alert('请先生成匹配方案');
    });

    document.getElementById('contractAmount').addEventListener('input', function() {
        const amount = parseFloat(this.value);
        if (!isNaN(amount) && amount > 0) {
            const suggestedPages = Math.round(amount / 0.68);
            document.getElementById('totalPages').placeholder = `参考值：约 ${suggestedPages} 页`;
        } else {
            document.getElementById('totalPages').placeholder = "请输入总页数";
        }
    });
</script>
</body>
